<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClevoCinema - Free Movies</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 5%;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,15,0.95);border-bottom:1px solid #2a2a3a}
.logo{font-size:1.5rem;font-weight:900;color:#e50914;text-decoration:none;cursor:pointer}
.nav-links{display:flex;gap:24px;list-style:none}
.nav-links a{color:#a0a0b0;text-decoration:none;font-weight:500;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:#fff}
.hero{height:60vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 5% 40px;background:linear-gradient(180deg,rgba(10,10,15,0) 0%,#0a0a0f 100%),url(https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1920&q=80) center/cover;margin-top:60px}
.hero h1{font-size:3rem;font-weight:900;margin-bottom:12px}
.hero h1 span{color:#e50914}
.hero p{color:#a0a0b0;max-width:600px;margin-bottom:20px;font-size:1.1rem}
.btn{padding:12px 24px;border:none;border-radius:4px;font-weight:700;font-size:1rem;cursor:pointer;margin-right:10px}
.btn-primary{background:#e50914;color:#fff}
.btn-secondary{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)}
main{padding:30px 5%}
.section{margin-bottom:40px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-size:1.4rem;font-weight:700}
.section-count{color:#6b6b7b;font-size:0.85rem}
.carousel{display:flex;gap:14px;overflow-x:auto;scroll-behavior:smooth;padding-bottom:10px}
.carousel::-webkit-scrollbar{display:none}
.movie-card{flex:0 0 180px;cursor:pointer;transition:transform 0.2s}
.movie-card:hover{transform:scale(1.05)}
.movie-poster{width:180px;height:270px;border-radius:8px;overflow:hidden;position:relative;background:#1e1e2e}
.movie-poster img{width:100%;height:100%;object-fit:cover}
.movie-year{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.7);color:#fff;font-size:0.7rem;font-weight:600;padding:3px 8px;border-radius:3px}
.movie-badge{position:absolute;top:8px;right:8px;background:#f5c518;color:#000;font-size:0.65rem;font-weight:800;padding:3px 6px;border-radius:3px}
.movie-info{padding:8px 2px}
.movie-title{font-size:0.85rem;font-weight:600;line-height:1.2;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.movie-meta{font-size:0.75rem;color:#6b6b7b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.video-box{width:100%;max-width:1000px;position:relative}
.video-box iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:8px}
.close-btn{position:absolute;top:-40px;right:0;background:rgba(255,255,255,0.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.2rem}
.close-btn:hover{background:#e50914}
.video-info{margin-top:15px}
.video-info h2{font-size:1.3rem;margin-bottom:6px}
.video-info p{color:#a0a0b0;font-size:0.9rem}
.pills{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.pill{padding:8px 16px;background:#12121a;border:1px solid #2a2a3a;color:#a0a0b0;border-radius:20px;font-family:inherit;font-weight:600;font-size:0.85rem;cursor:pointer}
.pill:hover,.pill.active{background:#e50914;color:#fff;border-color:#e50914}
footer{border-top:1px solid #2a2a3a;padding:30px 5%;text-align:center;color:#6b6b7b;font-size:0.8rem}
@media(max-width:768px){.nav-links{display:none}.hero h1{font-size:2rem}.movie-card{flex:0 0 140px}.movie-poster{width:140px;height:210px}}
</style>
<base target="_blank">
</head>
<body>
<nav>
<a class="logo" onclick="goHome()">CLEVO CINEMA</a>
<ul class="nav-links">
<li><a onclick="goHome()" class="active" id="nav-home">Home</a></li>
<li><a onclick="showCat('action')" id="nav-action">Action</a></li>
<li><a onclick="showCat('animation')" id="nav-animation">Animation</a></li>
<li><a onclick="showCat('cars')" id="nav-cars">Cars</a></li>
<li><a onclick="showAll()" id="nav-all">All</a></li>
</ul>
</nav>

<div class="hero" id="hero">
<div>
<h1>Watch Classic Movies <span>Free</span></h1>
<p>Legally free films from the Internet Archive. No subscription needed.</p>
<button class="btn btn-primary" onclick="scrollMain()">Start Watching</button>
<button class="btn btn-secondary" onclick="showAll()">Browse All</button>
</div>
</div>

<main id="mainContent">
<div class="pills">
<button class="pill active" onclick="filterPill('all',this)">All</button>
<button class="pill" onclick="filterPill('action',this)">Action</button>
<button class="pill" onclick="filterPill('animation',this)">Animation</button>
<button class="pill" onclick="filterPill('cars',this)">Car Docs</button>
<button class="pill" onclick="filterPill('classic',this)">Classics</button>
<button class="pill" onclick="filterPill('documentary',this)">Documentary</button>
</div>
<div id="sections">Loading movies...</div>
</main>

<footer>
<p>ClevoCinema - Powered by Internet Archive</p>
<p>All films are Public Domain or Creative Commons</p>
</footer>

<div class="modal" id="modal" onclick="closeModal(event)">
<div class="video-box" onclick="event.stopPropagation()">
<button class="close-btn" onclick="closeModal()">X</button>
<div id="player"></div>
<div class="video-info" id="vinfo"></div>
</div>
</div>

<script>
var MOVIES={
action:[
{id:"TheGeneral",title:"The General",year:1926,creator:"Buster Keaton",rating:"9.0",thumb:"https://archive.org/services/img/TheGeneral",desc:"A railroad engineer rescues his locomotive from Union spies."},
{id:"SafetyLast",title:"Safety Last",year:1923,creator:"Harold Lloyd",rating:"8.1",thumb:"https://archive.org/services/img/SafetyLast",desc:"A clerk organizes a stunt climbing a tall building."},
{id:"TheMarkOfZorro",title:"The Mark of Zorro",year:1920,creator:"Douglas Fairbanks",rating:"7.4",thumb:"https://archive.org/services/img/TheMarkOfZorro",desc:"A fop is secretly the vigilante Zorro."},
{id:"Nosferatu",title:"Nosferatu",year:1922,creator:"F.W. Murnau",rating:"7.9",thumb:"https://archive.org/services/img/nosferatu1922",desc:"A vampire count seeks a new residence."},
{id:"TheLostWorld",title:"The Lost World",year:1925,creator:"Harry Hoyt",rating:"7.0",thumb:"https://archive.org/services/img/TheLostWorld",desc:"An expedition finds dinosaurs on a plateau."},
{id:"ThePhantomOfTheOpera",title:"The Phantom of the Opera",year:1925,creator:"Rupert Julian",rating:"7.6",thumb:"https://archive.org/services/img/ThePhantomOfTheOpera",desc:"A disfigured composer loves an opera singer."}
],
animation:[
{id:"superman_the_mechanical_monsters",title:"Superman: Mechanical Monsters",year:1941,creator:"Fleischer Studios",rating:"7.8",thumb:"https://archive.org/services/img/superman_the_mechanical_monsters",desc:"Superman vs a mad scientist with robots."},
{id:"BettyBoopMinnieTheMoocher",title:"Betty Boop: Minnie the Moocher",year:1932,creator:"Max Fleischer",rating:"7.5",thumb:"https://archive.org/services/img/BettyBoopMinnieTheMoocher",desc:"Betty Boop runs away and meets a singing walrus."},
{id:"Popeye_the_Sailor_Meets_Sindbad_the_Sailor",title:"Popeye Meets Sindbad",year:1936,creator:"Fleischer Studios",rating:"7.3",thumb:"https://archive.org/services/img/Popeye_the_Sailor_Meets_Sindbad_the_Sailor",desc:"Popeye battles Sindbad the Sailor."},
{id:"felix_the_cat",title:"Felix the Cat",year:1920,creator:"Pat Sullivan",rating:"7.0",thumb:"https://archive.org/services/img/felix_the_cat",desc:"The iconic silent-era cartoon cat."},
{id:"SteamboatWillie",title:"Steamboat Willie",year:1928,creator:"Walt Disney",rating:"7.5",thumb:"https://archive.org/services/img/SteamboatWillie",desc:"Mickey Mouses debut as a steamboat pilot."},
{id:"TheSkeletonDance",title:"The Skeleton Dance",year:1929,creator:"Walt Disney",rating:"7.6",thumb:"https://archive.org/services/img/TheSkeletonDance",desc:"Dancing skeletons in a graveyard."}
],
cars:[
{id:"DetroitDreamCruise1999",title:"Detroit Dream Cruise 1999",year:1999,creator:"Detroit Historical",rating:"7.0",thumb:"https://archive.org/services/img/DetroitDreamCruise1999",desc:"The worlds largest one-day car show."},
{id:"HotRodGang1958",title:"Hot Rod Gang",year:1958,creator:"American International",rating:"5.5",thumb:"https://archive.org/services/img/HotRodGang1958",desc:"A singer gets mixed up with a hot rod gang."},
{id:"The_Beautiful_Dream_The_Ford_Rotunda",title:"Ford Rotunda",year:1962,creator:"Ford Motor",rating:"6.5",thumb:"https://archive.org/services/img/The_Beautiful_Dream_The_Ford_Rotunda",desc:"Fords iconic automotive display center."},
{id:"GM_around_the_world",title:"GM Around the World",year:1957,creator:"General Motors",rating:"6.0",thumb:"https://archive.org/services/img/GM_around_the_world",desc:"GMs global automotive operations."},
{id:"1956_Chevrolet_Sponsored_Film",title:"1956 Chevrolet",year:1956,creator:"Chevrolet",rating:"6.5",thumb:"https://archive.org/services/img/1956_Chevrolet_Sponsored_Film",desc:"Chevrolets vision of the automotive future."},
{id:"The_Magic_of_Ford",title:"The Magic of Ford",year:1961,creator:"Ford Motor",rating:"6.0",thumb:"https://archive.org/services/img/The_Magic_of_Ford",desc:"Ford manufacturing and innovation."}
],
classic:[
{id:"Metropolis",title:"Metropolis",year:1927,creator:"Fritz Lang",rating:"8.3",thumb:"https://archive.org/services/img/Metropolisrestored",desc:"A futuristic city divided by class."},
{id:"night_of_the_living_dead",title:"Night of the Living Dead",year:1968,creator:"George Romero",rating:"7.8",thumb:"https://archive.org/services/img/night_of_the_living_dead",desc:"Survivors hide from zombies in a farmhouse."},
{id:"HisGirlFriday",title:"His Girl Friday",year:1940,creator:"Howard Hawks",rating:"7.8",thumb:"https://archive.org/services/img/HisGirlFriday",desc:"An editor tries to stop his ex-wife from remarrying."},
{id:"TheGoldRush",title:"The Gold Rush",year:1925,creator:"Charlie Chaplin",rating:"8.1",thumb:"https://archive.org/services/img/CC_1925_The_Gold_Rush",desc:"A prospector seeks gold and finds love in Alaska."},
{id:"Sunrise1927",title:"Sunrise",year:1927,creator:"F.W. Murnau",rating:"8.1",thumb:"https://archive.org/services/img/Sunrise1927",desc:"A farmer is tempted by a city woman."},
{id:"TheCabinetOfDr.Caligari1919",title:"The Cabinet of Dr Caligari",year:1920,creator:"Robert Wiene",rating:"8.0",thumb:"https://archive.org/services/img/TheCabinetOfDr.Caligari1919",desc:"A hypnotist and his sleepwalker commit murders."}
],
documentary:[
{id:"NASA_Apollo_11",title:"Apollo 11",year:1969,creator:"NASA",rating:"8.5",thumb:"https://archive.org/services/img/NASA_Apollo_11",desc:"The historic moon landing mission footage."},
{id:"Prelinger_PanamaCanal",title:"The Panama Canal",year:1913,creator:"Prelinger Archives",rating:"7.0",thumb:"https://archive.org/services/img/Prelinger_PanamaCanal",desc:"Construction of the Panama Canal."},
{id:"TheWorldAtWar",title:"The World at War",year:1942,creator:"US Government",rating:"7.5",thumb:"https://archive.org/services/img/TheWorldAtWar",desc:"WWII documentary series."},
{id:"Prelinger_DuckAndCover",title:"Duck and Cover",year:1952,creator:"US Civil Defense",rating:"6.5",thumb:"https://archive.org/services/img/Prelinger_DuckAndCover",desc:"Cold War civil defense with Bert the Turtle."},
{id:"NASA_Skylab",title:"Skylab",year:1973,creator:"NASA",rating:"7.5",thumb:"https://archive.org/services/img/NASA_Skylab",desc:"Americas first space station."},
{id:"NASA_Moonwalk_One",title:"Moonwalk One",year:1970,creator:"NASA",rating:"7.8",thumb:"https://archive.org/services/img/NASA_Moonwalk_One",desc:"The definitive Apollo 11 documentary."}
]
};

var LABELS={action:"Action & Adventure",animation:"Animation & Cartoons",cars:"Car Documentaries",classic:"Classic Hollywood",documentary:"Documentaries"};
var ALL=[];
for(var c in MOVIES){for(var i=0;i<MOVIES[c].length;i++){var m=MOVIES[c][i];ALL.push({id:m.id,title:m.title,year:m.year,creator:m.creator,rating:m.rating,thumb:m.thumb,desc:m.desc,category:c});}}

function makeCard(m){
return '<div class="movie-card" onclick="openVideo(''+m.id+'',''+m.title.replace(/'/g,"\'")+'','+m.year+',''+m.creator.replace(/'/g,"\'")+'',''+m.desc.replace(/'/g,"\'")+'')">'+
'<div class="movie-poster">'+
'<img src="'+m.thumb+'" alt="'+m.title+'" loading="lazy" onerror="this.style.display='none'">'+
'<div class="movie-year">'+m.year+'</div>'+
'<div class="movie-badge">'+m.rating+'</div>'+
'</div>'+
'<div class="movie-info">'+
'<div class="movie-title">'+m.title+'</div>'+
'<div class="movie-meta">'+m.creator+'</div>'+
'</div>'+
'</div>';
}

function renderHome(){
var h="";
for(var c in MOVIES){
var movies=MOVIES[c];
h+='<div class="section">';
h+='<div class="section-header"><div class="section-title">'+LABELS[c]+'</div><div class="section-count">'+movies.length+' films</div></div>';
h+='<div class="carousel">';
for(var i=0;i<movies.length;i++){h+=makeCard(movies[i]);}
h+='</div></div>';
}
document.getElementById("sections").innerHTML=h;
}

function renderGrid(movies,title){
var h='<div class="section">';
h+='<div class="section-header"><div class="section-title">'+title+'</div><div class="section-count">'+movies.length+' films</div></div>';
h+='<div class="grid">';
for(var i=0;i<movies.length;i++){h+=makeCard(movies[i]);}
h+='</div></div>';
document.getElementById("sections").innerHTML=h;
}

function setNav(id){
document.querySelectorAll(".nav-links a").forEach(function(a){a.classList.remove("active");});
var el=document.getElementById(id);if(el)el.classList.add("active");
}

function goHome(){setNav("nav-home");document.getElementById("hero").style.display="flex";window.scrollTo(0,0);renderHome();}
function showCat(c){setNav("nav-"+c);document.getElementById("hero").style.display="none";window.scrollTo(0,0);renderGrid(MOVIES[c]||[],LABELS[c]||c);}
function showAll(){setNav("nav-all");document.getElementById("hero").style.display="none";window.scrollTo(0,0);renderGrid(ALL,"All Movies");}
function filterPill(c,btn){document.querySelectorAll(".pill").forEach(function(p){p.classList.remove("active");});btn.classList.add("active");if(c==="all"){renderHome();}else{renderGrid(MOVIES[c]||[],LABELS[c]||c);}}
function scrollMain(){document.getElementById("mainContent").scrollIntoView({behavior:"smooth"});}

function openVideo(id,title,year,creator,desc){
var modal=document.getElementById("modal");
var player=document.getElementById("player");
var info=document.getElementById("vinfo");
player.innerHTML='<iframe src="https://archive.org/embed/'+id+'" frameborder="0" allowfullscreen></iframe>';
info.innerHTML='<h2>'+title+' ('+year+')</h2><p>'+creator+' - '+desc+'</p>';
modal.classList.add("active");
document.body.style.overflow="hidden";
}

function closeModal(e){
if(e&&e.target!==e.currentTarget)return;
document.getElementById("modal").classList.remove("active");
document.body.style.overflow="";
document.getElementById("player").innerHTML="";
}

renderHome();
</script>
</body>
</html>
